  <style>header {
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

header svg {
  pointer-events: none;
  z-index: -1;
  position: absolute;
  top: 0;
}

picture {
  filter: var(--image-filter);
  -webkit-user-select: none;
  user-select: none;
  clip-path: url("#squircle-mask");
  height: var(--base-width);
  display: block;
}

header h1 {
  color: #f7f7f7;
  text-shadow: 0 0 6px #0c1817;
  z-index: 1;
  text-align: center;
  margin: 0;
  padding: .5rem;
  font-size: 1.6rem;
  line-height: 2.5rem;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
}

.links {
  align-items: center;
  display: flex;
}

.links span {
  flex: 0;
}

.links a {
  text-align: center;
  transition: all var(--transition-options);
  opacity: .5;
  flex: 1;
}

.links svg {
  height: 14px;
}

.links a path {
  fill: var(--text);
}

.links a:hover, .links a:focus {
  opacity: 1;
  transform: translateY(-2px);
}

.links a:hover path {
  fill: var(--link-hover);
}

dt {
  color: var(--caption);
  letter-spacing: .02rem;
  font-size: .87rem;
  font-weight: 300;
}

dd {
  margin: 0;
}

dd:after {
  content: "";
  height: 1px;
  transition: background-image var(--transition-options);
  background-image: linear-gradient( var(--delimiter), var(--delimiter));
  margin: .8rem .2rem;
  display: block;
}

@media (-webkit-min-device-pixel-ratio: 2) {
  dd:after {
    background-image: linear-gradient( var(--delimiter) 50%, transparent 51% );
  }
}

@media (-webkit-min-device-pixel-ratio: 3) {
  dd:after {
    background-image: linear-gradient( var(--delimiter) 33%, transparent 34% );
  }
}

@media (-webkit-min-device-pixel-ratio: 4) {
  dd:after {
    background-image: linear-gradient( var(--delimiter) 25%, transparent 26% );
  }
}

.sky {
  --angle: 170deg;
  -webkit-user-select: none;
  user-select: none;
  width: var(--base-width);
  height: var(--base-width);
  text-align: center;
  cursor: pointer;
  font-size: 1.2rem;
  position: absolute;
  inset: 0;
  overflow: hidden;
  transform: translateZ(0);
}

.moon, .sun {
  animation-duration: var(--day-length);
  pointer-events: none;
  transition: all .25s linear;
  animation-timing-function: linear;
  animation-direction: alternate;
  animation-delay: 0s;
  animation-fill-mode: forwards;
  position: absolute;
  top: 5px;
  bottom: 0;
  transform: translateX(-50%);
}

.day .sun {
  animation-name: sunrise;
}

.day .moon {
  animation-name: dawn;
}

.night .sun {
  animation-name: sunset;
}

.night .moon {
  animation-name: dusk;
}

@keyframes sunrise {
  from {
    transform: translateX(-50%) rotate(calc(-1 * var(--angle)) );
    opacity: 0;
  }

  to {
    opacity: 1;
    transform: translateX(-50%)rotate(0deg);
  }
}

@keyframes sunset {
  from {
    opacity: 1;
    transform: translateX(-50%)rotate(0deg);
  }

  to {
    transform: translateX(-50%) rotate(var(--angle));
    opacity: 0;
  }
}

@keyframes dawn {
  from {
    opacity: 1;
    transform: translateX(-50%)rotate(0deg);
  }

  to {
    transform: translateX(-50%) rotate(var(--angle));
    opacity: 0;
  }
}

@keyframes dusk {
  from {
    transform: translateX(-50%) rotate(calc(-1 * var(--angle)) );
    opacity: 0;
  }

  to {
    opacity: 1;
    transform: translateX(-50%)rotate(0deg);
  }
}

.day {
  --background: #f1eded;
  --text: #2c2d30;
  --caption: #333;
  --link: #1264a3;
  --link-hover: #0b4c8c;
  --delimiter: #949494;
  --image-filter: none;
}

.night {
  --background: #150708;
  --text: #ffffe0;
  --caption: #b7b7b7;
  --link: #e88030;
  --link-hover: #ff9c52;
  --delimiter: gray;
  --image-filter: brightness(.85);
}

body {
  --base-width: 300px;
  --transition-options: ease-out .15s;
  --day-length: .6s;
  background-color: var(--background);
  width: var(--base-width);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: all var(--transition-options);
  margin: 1.5rem auto 0;
  padding: 0 .5rem;
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Oxygen, Ubuntu, Cantarell, Fira Sans, Droid Sans, Helvetica Neue, sans-serif;
  font-size: 1.1em;
  line-height: 1.33;
}

@media (max-width: 316px) {
  body {
    margin-top: .5rem;
  }
}

a {
  color: var(--link);
  transition: color var(--transition-options);
}

a:hover {
  color: var(--link-hover);
  text-decoration: underline;
}



</style>
